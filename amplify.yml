version: 1
applications:
  - appRoot: frontend
    frontend:
      phases:
        preBuild:
          commands:
            - yarn install --ignore-engines
        build:
          commands:
            - yarn run build
      artifacts:
        baseDirectory: build
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
    customHttp:
      redirects:
        - source: /sitemap.xml
          target: /sitemap.xml
          status: 200
        - source: /robots.txt
          target: /robots.txt
          status: 200
      customHeaders:
        - pattern: '**/*.xml'
          headers:
            - key: 'Content-Type'
              value: 'application/xml'
            - key: 'Cache-Control'
              value: 'public, max-age=3600'
        - pattern: '**/*.txt'
          headers:
            - key: 'Content-Type'
              value: 'text/plain'
            - key: 'Cache-Control'
              value: 'public, max-age=3600'
        - pattern: '**/*.mp3'
          headers:
            - key: 'Content-Type'
              value: 'audio/mpeg'
            - key: 'Cache-Control'
              value: 'public, max-age=31536000, immutable'
        - pattern: '**/*.wav'
          headers:
            - key: 'Content-Type'
              value: 'audio/wav'
        - pattern: '**/*.ogg'
          headers:
            - key: 'Content-Type'
              value: 'audio/ogg'
