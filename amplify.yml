version: 1
applications:
  - appRoot: frontend
    frontend:
      phases:
        preBuild:
          commands:
            - yarn install --ignore-engines
        build:
          commands:
            - yarn run build
      artifacts:
        baseDirectory: build
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
    customHttp:
      customHeaders:
        - pattern: '**/*.mp3'
          headers:
            - key: 'Content-Type'
              value: 'audio/mpeg'
            - key: 'Cache-Control'
              value: 'public, max-age=31536000, immutable'
        - pattern: '**/*.wav'
          headers:
            - key: 'Content-Type'
              value: 'audio/wav'
        - pattern: '**/*.ogg'
          headers:
            - key: 'Content-Type'
              value: 'audio/ogg'
